services:
  - type: web
    name: kartikupload
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --keep-alive 5
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MAX_FILE_MB
        value: 500
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
